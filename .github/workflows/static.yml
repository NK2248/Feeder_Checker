name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"] # Triggers the workflow every time you push to main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads the entire repository root. Change to './dist' if using a framework.

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
